<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Timer</title>
</head>
<body>
    <main class="main">
        <section id="timer-section">
            <div class="sub t-cal"><img src="./images/remove-svgrepo-com.svg" alt="" srcset="" class="img-btn"></div>
            <div id="timer">
                <p id="min">00</p>
                <p id="sec"">00</p>
            </div>
            <div class="add t-cal"><img src="./images/add-svgrepo-com.svg" alt="" class="img-btn"></div>
        </section>
        <article id="timer-btns">
            <section class="btns">
                <div class="fun-btn play-btn">
                    <img src="./images/play-svgrepo-com.svg" alt="" class="img-btn low-btn play">
                    <p>Play</p>
                </div>
                <div class="fun-btn pause-btn">
                    <img src="./images/stop-svgrepo-com.svg" alt="" class="img-btn low-btn pause">
                    <p>Pause</p>
                </div>
                <div class="fun-btn">
                    <img src="./images/reset-reload-svgrepo-com.svg" alt="" class="img-btn low-btn reset">
                    <p>Reset</p>
                </div>
            </section>
        </article>
    </main>
    <script src="main.js"></script>
</body>
</html>
